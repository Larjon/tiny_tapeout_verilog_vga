# Tiny Tapeout project information
project:
  title:        "Bouncing Square"
  author:       "Lukasz Kowalka"
  discord:      ""
  description:  "DVD-style bouncing red square on VGA (640x480)."
  language:     "Verilog"
  clock_hz:     25200000

  # How many tiles your design occupies?
  tiles: "1x1"

  # Your top module name must start with "tt_um_"
  top_module:  "tt_um_vga_example"

  # List your project's source files here.
  source_files:
    - "project.v"
    - "hvsync_generator.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs (TinyVGA PMOD mapping)
  uo[0]: "HSYNC"
  uo[1]: "B0"
  uo[2]: "G0"
  uo[3]: "R0"
  uo[4]: "VSYNC"
  uo[5]: "B1"
  uo[6]: "G1"
  uo[7]: "R1"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
